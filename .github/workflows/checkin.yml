name: Sunday check-in trigger

on:
  schedule:
    # 08:00 UTC = 09:00 Berlin (CET) / 10:00 Berlin (CEST)
    # Adjust to '0 7 * * 0' during CEST if you want a stable 09:00 local time.
    - cron: '0 8 * * 0'
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot trigger endpoint
        run: |
          curl -sS -X POST "${BOT_TRIGGER_URL}" \
               -H "Authorization: Bearer ${TRIGGER_SECRET}" \
               --fail-with-body
        env:
          BOT_TRIGGER_URL: ${{ secrets.BOT_TRIGGER_URL }}
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
