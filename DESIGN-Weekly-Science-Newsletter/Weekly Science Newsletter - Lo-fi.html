<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weekly Science Newsletter — Lo-fi</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f4f2ee; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="newsletter-blocks.jsx"></script>

<script type="text/babel">
  const { useEffect } = React;

  // A — Science-led: big fact opens, then recap → plan → download
  function LayoutA() {
    return (
      <div style={{ fontFamily: SANS }}>
        <Masthead />
        <HeroFact />
        <Rule />
        <Recap />
        <Rule />
        <PlanPreview />
        <Cta />
        <Footer />
      </div>
    );
  }

  // B — Action-forward: recap strip up top, plan+download grouped high,
  //     science fact as the closing hero
  function LayoutB() {
    return (
      <div style={{ fontFamily: SANS }}>
        <Masthead />
        <Recap strip={true} />
        <PlanPreview flush={true} />
        <Cta tight={true} />
        <div style={{ height: 8, background: '#f1f1f1' }} />
        <HeroFact compact={true} />
        <Footer />
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="newsletter" title="Sunday Newsletter — Lo-fi"
          subtitle="600px email · same blocks, two arrangements">
          <DCArtboard id="A" label="A · Science-led" width={600} height={1175}>
            <LayoutA />
          </DCArtboard>
          <DCArtboard id="B" label="B · Action-forward" width={600} height={963}>
            <LayoutB />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
