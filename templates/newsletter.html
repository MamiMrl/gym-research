{# Light Weight — weekly newsletter (hi-fi).

   Email-safe port of DESIGN-Weekly-Science-Newsletter/newsletter-hifi.jsx.
   Rules:
   - All CSS inline (Gmail strips <style>).
   - <table role="presentation"> for layout (Outlook desktop falls back to
     block on flex/grid).
   - bgcolor= attribute set alongside style:background (Outlook).
   - Width attributes on <img> + <td> (Outlook needs them numeric).
   - Hidden preheader span first thing in <body> so the inbox preview
     pulls our copy and not the masthead.

   Context vars: see core/newsletter.build_context().
#}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>{{ subject }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body style="margin:0;padding:0;background:#E7E5DF;-webkit-font-smoothing:antialiased;">

{# ── preheader (hidden but pulled into the inbox preview) ───────── #}
<div style="display:none;font-size:1px;color:#E7E5DF;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">
  {{ preheader }}
</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#E7E5DF" style="background:#E7E5DF;">
<tr><td align="center" style="padding:40px 20px 80px;">

<table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" bgcolor="#FFFFFF"
       style="width:600px;max-width:600px;background:#FFFFFF;border-radius:4px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.08), 0 24px 60px -18px rgba(0,0,0,.30);">

  {# ── MASTHEAD ──────────────────────────────────────────────── #}
  <tr>
    <td bgcolor="{{ accent }}" height="5" style="background:{{ accent }};font-size:0;line-height:0;height:5px;">&nbsp;</td>
  </tr>
  <tr>
    <td bgcolor="#121210" style="background:#121210;padding:26px 40px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td align="left" valign="middle">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td bgcolor="{{ accent }}" width="34" height="34" align="center" valign="middle"
                    style="background:{{ accent }};width:34px;height:34px;border-radius:6px;font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:24px;color:#121210;line-height:34px;">L</td>
                <td width="13" style="width:13px;font-size:0;line-height:0;">&nbsp;</td>
                <td style="font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:34px;color:#FFFFFF;letter-spacing:0.05em;line-height:1;white-space:nowrap;">
                  {{ name }}<span style="color:{{ accent }};">.</span>
                </td>
              </tr>
            </table>
          </td>
          <td align="right" valign="middle" style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11px;color:rgba(255,255,255,0.55);line-height:1.6;letter-spacing:0.04em;text-align:right;">
            ISSUE {{ issue_str }}<br/>{{ date_str }}
          </td>
        </tr>
      </table>
    </td>
  </tr>

  {# ── DELOAD BANNER (conditional) ───────────────────────────── #}
  {% if deload %}
  <tr>
    <td bgcolor="{{ accent }}" style="background:{{ accent }};padding:14px 40px;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:24px;color:#121210;line-height:1;letter-spacing:0.04em;white-space:nowrap;">
            ⚠ DELOAD WEEK
          </td>
          <td width="14" style="width:14px;font-size:0;line-height:0;">&nbsp;</td>
          <td style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11px;color:rgba(0,0,0,0.7);line-height:1.5;">
            Same loads · ~50% volume · supercompensate, don't grind.
          </td>
        </tr>
      </table>
    </td>
  </tr>
  {% endif %}

  {# ── HERO PHOTO (conditional) ──────────────────────────────── #}
  {% if show_hero and hero_image_url %}
  <tr>
    <td style="line-height:0;font-size:0;">
      <img src="{{ hero_image_url }}" alt="{{ hero_alt }}" width="600" height="240"
           style="display:block;width:100%;max-width:600px;height:240px;border:0;outline:none;text-decoration:none;" />
    </td>
  </tr>
  {% endif %}

  {# ── FACT BLOCK ────────────────────────────────────────────── #}
  <tr>
    <td bgcolor="#FFFFFF" style="background:#FFFFFF;padding:38px 40px 34px;">
      {% if show_hero %}
      <div style="margin-bottom:18px;">
        <span style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;font-weight:600;color:#121210;background:{{ accent }};padding:5px 9px;border-radius:3px;display:inline-block;">Science fact of the week</span>
      </div>
      {% endif %}
      <h1 style="margin:0;font-family:'Archivo',Helvetica,Arial,sans-serif;font-weight:800;color:#121210;font-size:33px;line-height:1.14;letter-spacing:-0.02em;">{{ fact.headline_prefix }}<span style="background:{{ accent }};padding:0 6px;-webkit-box-decoration-break:clone;box-decoration-break:clone;">{{ fact.highlight }}</span>{{ fact.headline_suffix }}</h1>

      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top:20px;">
        <tr>
          <td width="26" height="2" bgcolor="#121210" style="width:26px;height:2px;background:#121210;font-size:0;line-height:0;">&nbsp;</td>
          <td width="11" style="width:11px;font-size:0;line-height:0;">&nbsp;</td>
          <td style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11.5px;color:#6C6B63;letter-spacing:0.02em;line-height:1.5;">
            {{ fact.citation }}
          </td>
        </tr>
      </table>

      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:26px;">
        <tr>
          <td style="border-top:1px solid #E6E4DB;padding-top:20px;">
            <div style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:#9C9B91;font-weight:600;margin-bottom:8px;">
              Why it matters
            </div>
            <p style="margin:0;font-family:'Archivo',Helvetica,Arial,sans-serif;font-weight:600;font-size:16.5px;line-height:1.5;color:#121210;">
              {{ fact.why_it_matters }}
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  {# ── LAST WEEK RECAP ───────────────────────────────────────── #}
  <tr>
    <td bgcolor="#F2F1EA" style="background:#F2F1EA;padding:32px 40px;border-top:1px solid #E6E4DB;">

      {# section label: yellow vertical bar + LAST WEEK #}
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:18px;">
        <tr>
          <td width="9" height="18" bgcolor="{{ accent }}" style="width:9px;height:18px;background:{{ accent }};font-size:0;line-height:0;">&nbsp;</td>
          <td width="10" style="width:10px;font-size:0;line-height:0;">&nbsp;</td>
          <td style="font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:26px;letter-spacing:0.04em;color:#121210;line-height:1;white-space:nowrap;">
            LAST WEEK
          </td>
        </tr>
      </table>

      {# 3 stat tiles #}
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td width="33%" valign="top" style="padding-right:6px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#FFFFFF" style="background:#FFFFFF;border:1px solid #E6E4DB;border-radius:10px;">
              <tr><td align="center" style="padding:18px 10px 14px;">
                <div style="font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:42px;line-height:0.9;color:#121210;letter-spacing:0.01em;">{{ recap.sessions_str }}</div>
                <div style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10px;color:#6C6B63;margin-top:9px;letter-spacing:0.1em;text-transform:uppercase;">sessions</div>
              </td></tr>
            </table>
          </td>
          <td width="33%" valign="top" style="padding-left:3px;padding-right:3px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#FFFFFF" style="background:#FFFFFF;border:1px solid #E6E4DB;border-radius:10px;">
              <tr><td align="center" style="padding:18px 10px 14px;">
                <div style="display:inline-block;font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:42px;line-height:0.9;color:#121210;letter-spacing:0.01em;border-bottom:3px solid {{ accent }};padding-bottom:2px;">{{ recap.kg_added_str }}</div>
                <div style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10px;color:#6C6B63;margin-top:9px;letter-spacing:0.1em;text-transform:uppercase;">kg added</div>
              </td></tr>
            </table>
          </td>
          <td width="33%" valign="top" style="padding-left:6px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#FFFFFF" style="background:#FFFFFF;border:1px solid #E6E4DB;border-radius:10px;">
              <tr><td align="center" style="padding:18px 10px 14px;">
                <div style="font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:42px;line-height:0.9;color:#121210;letter-spacing:0.01em;">{{ recap.skipped_count }}</div>
                <div style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10px;color:#6C6B63;margin-top:9px;letter-spacing:0.1em;text-transform:uppercase;">skipped</div>
              </td></tr>
            </table>
          </td>
        </tr>
      </table>

      <p style="margin:18px 0 0;font-family:'Archivo',Helvetica,Arial,sans-serif;font-size:14.5px;line-height:1.5;color:#6C6B63;">
        {{ recap.highlight_html|safe }}
      </p>
    </td>
  </tr>

  {# ── THIS WEEK'S PLAN ──────────────────────────────────────── #}
  <tr>
    <td bgcolor="#FFFFFF" style="background:#FFFFFF;padding:32px 40px 30px;border-top:1px solid #E6E4DB;">

      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:18px;">
        <tr>
          <td align="left" valign="middle">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td width="9" height="18" bgcolor="{{ accent }}" style="width:9px;height:18px;background:{{ accent }};font-size:0;line-height:0;">&nbsp;</td>
                <td width="10" style="width:10px;font-size:0;line-height:0;">&nbsp;</td>
                <td style="font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:26px;letter-spacing:0.04em;color:#121210;line-height:1;white-space:nowrap;">
                  THIS WEEK
                </td>
              </tr>
            </table>
          </td>
          <td align="right" valign="middle" style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10px;color:#6C6B63;letter-spacing:0.08em;white-space:nowrap;">
            <span style="border:1px solid #E6E4DB;border-radius:20px;padding:5px 11px;">
              {% if deload %}DELOAD · 4 DAYS{% else %}UPPER/LOWER · 4 DAYS{% endif %}
            </span>
          </td>
        </tr>
      </table>

      {# day rows: one nested table per row, all inside an outer bordered container #}
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #E6E4DB;border-radius:12px;border-collapse:separate;">
        {% for row in plan_rows %}
        <tr>
          <td style="padding:12px 14px;{% if not loop.first %}border-top:1px solid #E6E4DB;{% endif %}">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td width="50" valign="middle" style="width:50px;font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:24px;color:#121210;letter-spacing:0.03em;line-height:1;">{{ row.day }}</td>
                <td width="1" valign="middle" style="width:1px;background:#E6E4DB;font-size:0;line-height:0;" bgcolor="#E6E4DB">&nbsp;</td>
                <td valign="middle" style="padding-left:14px;">
                  <div style="font-family:'Archivo',Helvetica,Arial,sans-serif;font-weight:700;font-size:14.5px;color:#121210;">{{ row.session }}</div>
                  <div style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11px;color:#6C6B63;margin-top:3px;">
                    {{ row.top_set_name }} · <span style="color:#121210;font-weight:600;">{{ row.top_set_load }}</span>{% if row.deload_note %}<span style="color:#9a8b00;font-weight:600;"> · {{ row.deload_note }}</span>{% endif %}
                  </div>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        {% endfor %}
      </table>
    </td>
  </tr>

  {# ── DOWNLOAD CTA ──────────────────────────────────────────── #}
  <tr>
    <td bgcolor="#FFFFFF" style="background:#FFFFFF;padding:4px 40px 38px;">
      <a href="{{ cta.href }}" style="text-decoration:none;display:block;color:#121210;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="{{ accent }}"
               style="background:{{ accent }};border-radius:12px;box-shadow:0 6px 0 0 rgba(0,0,0,.12);">
          <tr>
            <td align="center" valign="middle" style="padding:20px 22px;">
              <span style="font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:20px;color:#121210;line-height:1;vertical-align:middle;">↓</span>
              &nbsp;&nbsp;
              <span style="font-family:'Archivo',Helvetica,Arial,sans-serif;font-weight:800;font-size:17px;color:#121210;letter-spacing:0.01em;line-height:1;vertical-align:middle;">
                {{ cta.label_main }}
              </span>
            </td>
          </tr>
        </table>
      </a>
      <div style="text-align:center;margin-top:13px;">
        <span style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11px;color:#9C9B91;letter-spacing:0.03em;">
          {{ cta.label_sub }}
        </span>
      </div>
    </td>
  </tr>

  {# ── FOOTER ────────────────────────────────────────────────── #}
  <tr>
    <td bgcolor="#121210" style="background:#121210;padding:30px 40px 34px;">
      <div style="font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:24px;color:#FFFFFF;letter-spacing:0.05em;line-height:1;">
        {{ name }}<span style="color:{{ accent }};">.</span>
      </div>
      <p style="margin:12px 0 18px;font-family:'Archivo',Helvetica,Arial,sans-serif;font-size:13px;line-height:1.55;color:rgba(255,255,255,0.55);max-width:380px;">
        {{ footer.tagline }}
      </p>
      <div style="font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10.5px;color:rgba(255,255,255,0.4);letter-spacing:0.08em;">
        UNSUBSCRIBE&nbsp;&nbsp;·&nbsp;&nbsp;VIEW ARCHIVE&nbsp;&nbsp;·&nbsp;&nbsp;SENT EVERY SUNDAY
      </div>
    </td>
  </tr>

</table>

</td></tr>
</table>

</body>
</html>
